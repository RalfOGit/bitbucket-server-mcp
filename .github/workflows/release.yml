name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run when CI succeeds and the commit is not a release commit
    if: github.event.workflow_run.conclusion == 'success' && !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')

    environment:
      name: pypi
      url: https://pypi.org/p/bitbucket-server-mcp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master

      - name: Check for release commit
        id: skip
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" == chore\(release\):* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: release commit detected."
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.skip.outputs.is_release != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.skip.outputs.is_release != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Configure git
        if: steps.skip.outputs.is_release != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # PSR determines version from conventional commits:
      #   feat: -> minor bump (1.x.0)
      #   fix:/perf: -> patch bump (1.0.x)
      #   BREAKING CHANGE: -> major bump (x.0.0)
      - name: Python Semantic Release — Determine version
        if: steps.skip.outputs.is_release != 'true'
        id: semver
        run: |
          OUTPUT=$(semantic-release --noop version --print 2>&1) || true
          # --print outputs the next version number or nothing if no release needed
          # Filter to only a valid semver line (digits and dots)
          VERSION=$(echo "$OUTPUT" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -z "$VERSION" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new release needed."
            echo "PSR output: $OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "New version: $VERSION"
          fi

      - name: Python Semantic Release — Version, changelog & tag
        if: steps.semver.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release version --skip-build --no-vcs-release

      - name: Push version commit & tag
        if: steps.semver.outputs.released == 'true'
        run: |
          git push origin master
          git push origin --tags

      - name: Build package
        if: steps.semver.outputs.released == 'true'
        run: python -m build

      - name: Verify package
        if: steps.semver.outputs.released == 'true'
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        if: steps.semver.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publishing (OIDC) — no API token needed
          # Configure at: https://pypi.org/manage/project/bitbucket-server-mcp/settings/publishing/
          print-hash: true

      - name: Create GitHub Release
        if: steps.semver.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.semver.outputs.new_version }}" dist/* \
            --title "v${{ steps.semver.outputs.new_version }}" \
            --generate-notes

      - name: Summary
        if: steps.semver.outputs.released == 'true'
        run: |
          echo "## Release v${{ steps.semver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Published to PyPI" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release created" >> $GITHUB_STEP_SUMMARY
          echo "- Install: \`pip install bitbucket-server-mcp==${{ steps.semver.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
